<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>О4ко — Сонцезахисні окуляри</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --dark: #0A0A0A;
    --dark2: #141414;
    --dark3: #1E1E1E;
    --text: #F0EDE8;
    --text-muted: #8A8580;
    --accent: #C9A96E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 60px 24px 40px;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(201,169,110,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeDown 0.8s ease both;
  }

  .logo span {
    font-style: italic;
  }

  .tagline {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 8px;
    animation: fadeDown 0.8s 0.15s ease both;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
    animation: fadeDown 0.8s 0.2s ease both;
  }

  /* CATALOG HEADER */
  .catalog-header {
    padding: 0 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .catalog-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text);
  }

  .catalog-count {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* PRODUCTS GRID */
  .products {
    padding: 0 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .product-card {
    background: var(--dark2);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(201,169,110,0.1);
    cursor: pointer;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }

  .product-card:active {
    transform: scale(0.97);
  }

  .product-card:hover {
    border-color: rgba(201,169,110,0.4);
    box-shadow: 0 8px 32px rgba(201,169,110,0.1);
  }

  .product-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--dark3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .product-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--dark3) 0%, #252525 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .product-info {
    padding: 12px;
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .product-price {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
  }

  .product-stock {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .add-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--dark);
    font-weight: 700;
    transition: transform 0.2s ease, background 0.2s ease;
    line-height: 1;
  }

  .add-btn:active {
    transform: scale(0.9);
    background: var(--gold-light);
  }

  /* CART BUTTON */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 24px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--dark) 60%, transparent);
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .cart-bar.visible {
    display: block;
  }

  .cart-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, #B8943A 100%);
    border: none;
    border-radius: 14px;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: opacity 0.2s;
  }

  .cart-btn:active { opacity: 0.85; }

  .cart-btn-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cart-badge {
    background: var(--dark);
    color: var(--gold);
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: 700;
  }

  .cart-total {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: flex-end;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  .modal {
    background: var(--dark2);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    border-top: 1px solid rgba(201,169,110,0.2);
    animation: slideUp 0.35s ease both;
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--dark3);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 16px;
    background: var(--dark3);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }

  .modal-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--dark3), #252525);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }

  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    margin-bottom: 8px;
  }

  .modal-desc {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .modal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-price {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--gold);
    font-weight: 700;
  }

  .modal-stock {
    font-size: 13px;
    color: var(--text-muted);
    background: var(--dark3);
    padding: 6px 12px;
    border-radius: 20px;
  }

  .modal-add-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, #B8943A 100%);
    border: none;
    border-radius: 14px;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }

  .modal-add-btn:active { opacity: 0.85; }

  .modal-close-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 14px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  /* CART MODAL */
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .cart-item-emoji {
    font-size: 32px;
    width: 48px;
    text-align: center;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .cart-item-price {
    font-size: 13px;
    color: var(--gold);
  }

  .cart-item-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.3);
    background: transparent;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .qty-btn:active { background: rgba(201,169,110,0.1); }
  .qty-num { font-size: 15px; font-weight: 500; min-width: 20px; text-align: center; }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0 0;
  }

  .cart-total-label { color: var(--text-muted); font-size: 14px; }

  .cart-total-price {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
  }

  .checkout-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, #B8943A 100%);
    border: none;
    border-radius: 14px;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.2s;
  }

  .checkout-btn:active { opacity: 0.85; }

  .empty-cart {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
  }

  .empty-cart-icon { font-size: 48px; margin-bottom: 12px; }

  /* TOAST */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--dark3);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .pb-cart { padding-bottom: 100px; }
</style>
</head>
<body>

<div class="hero">
  <div class="logo">О<span>4</span>ко</div>
  <div class="tagline">Сонцезахисні окуляри</div>
  <div class="divider"></div>
</div>

<div class="catalog-header">
  <div class="catalog-title">Каталог</div>
  <div class="catalog-count" id="productCount">0 товарів</div>
</div>

<div class="products pb-cart" id="productsGrid"></div>

<!-- Cart bar -->
<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="openCartModal()">
    <div class="cart-btn-left">
      <span>🛒</span>
      <span class="cart-badge" id="cartCount">0</span>
      <span>Кошик</span>
    </div>
    <span class="cart-total" id="cartTotalBtn">0 грн</span>
  </button>
</div>

<!-- Product modal -->
<div class="modal-overlay" id="productModal" onclick="closeProductModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Cart modal -->
<div class="modal-overlay" id="cartModal" onclick="closeCartModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 style="font-family:'Playfair Display',serif; margin-bottom:20px;">Кошик</h2>
    <div id="cartContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // Telegram Web App init
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // STATE
  let products = [];
  let cart = {};

  // DEMO PRODUCTS (замінити на реальні з API бота)
  const demoProducts = [
    { id: 1, name: "Класичні авіатори", description: "Класична форма авіатора з дзеркальними лінзами. Захист UV400. Металева оправа золотистого кольору.", price: 89900, stock: 8, emoji: "😎" },
    { id: 2, name: "Котячий погляд", description: "Витончена форма «котяче око» з поляризованими лінзами. Ацетатна оправа чорного кольору.", price: 119900, stock: 5, emoji: "🕶️" },
    { id: 3, name: "Спортивні Wrap", description: "Обтічна спортивна форма для активного відпочинку. Гумові вставки, захист від бокового світла.", price: 149900, stock: 3, emoji: "🏄" },
    { id: 4, name: "Ретро Round", description: "Круглі лінзи у стилі 70-х. Тонка металева оправа, тонований ефект. Унісекс.", price: 99900, stock: 12, emoji: "✨" },
    { id: 5, name: "Oversize Glam", description: "Великі квадратні лінзи для максимального захисту та стилю. Ацетат преміум якості.", price: 179900, stock: 4, emoji: "💫" },
    { id: 6, name: "Дитячі Mini", description: "Яскраві окуляри для дітей 3-10 років. М'яка оправа, безпечні лінзи, захист UV400.", price: 59900, stock: 15, emoji: "🌈" },
  ];

  function initProducts() {
    products = demoProducts;
    renderProducts();
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    const count = document.getElementById('productCount');
    count.textContent = `${products.length} товарів`;

    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="openProduct(${p.id})">
        <div class="product-img-placeholder">${p.emoji || '🕶️'}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
          <div class="product-stock">${p.stock} шт.</div>
        </div>
        <div class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+</div>
      </div>
    `).join('');
  }

  function formatPrice(price) {
    return (price / 100).toLocaleString('uk-UA') + ' грн';
  }

  // PRODUCT MODAL
  function openProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-img-placeholder">${p.emoji || '🕶️'}</div>
      <div class="modal-name">${p.name}</div>
      <div class="modal-desc">${p.description}</div>
      <div class="modal-row">
        <div class="modal-price">${formatPrice(p.price)}</div>
        <div class="modal-stock">📦 ${p.stock} шт.</div>
      </div>
      <button class="modal-add-btn" onclick="addToCart(${p.id}); closeModal()">🛒 Додати в кошик</button>
      <button class="modal-close-btn" onclick="closeModal()">Закрити</button>
    `;

    document.getElementById('productModal').classList.add('open');
  }

  function closeProductModal(e) {
    if (e.target === document.getElementById('productModal')) closeModal();
  }

  function closeModal() {
    document.getElementById('productModal').classList.remove('open');
  }

  // CART
  function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    updateCartUI();
    showToast('✅ Додано в кошик');
  }

  function removeFromCart(id) {
    if (cart[id] > 1) cart[id]--;
    else delete cart[id];
    updateCartUI();
    renderCartModal();
  }

  function updateCartUI() {
    const total = Object.entries(cart).reduce((sum, [id, qty]) => {
      const p = products.find(x => x.id == id);
      return sum + (p ? p.price * qty : 0);
    }, 0);

    const count = Object.values(cart).reduce((a, b) => a + b, 0);

    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartTotalBtn').textContent = formatPrice(total);
    document.getElementById('cartBar').classList.toggle('visible', count > 0);
  }

  function openCartModal() {
    renderCartModal();
    document.getElementById('cartModal').classList.add('open');
  }

  function closeCartModal(e) {
    if (e.target === document.getElementById('cartModal')) {
      document.getElementById('cartModal').classList.remove('open');
    }
  }

  function renderCartModal() {
    const content = document.getElementById('cartContent');
    const items = Object.entries(cart);

    if (items.length === 0) {
      content.innerHTML = `
        <div class="empty-cart">
          <div class="empty-cart-icon">🛒</div>
          <div>Кошик порожній</div>
        </div>
      `;
      return;
    }

    let total = 0;
    const itemsHTML = items.map(([id, qty]) => {
      const p = products.find(x => x.id == id);
      if (!p) return '';
      total += p.price * qty;
      return `
        <div class="cart-item">
          <div class="cart-item-emoji">${p.emoji || '🕶️'}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${p.name}</div>
            <div class="cart-item-price">${formatPrice(p.price)}</div>
          </div>
          <div class="cart-item-controls">
            <button class="qty-btn" onclick="removeFromCart(${id})">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="addToCart(${id})">+</button>
          </div>
        </div>
      `;
    }).join('');

    content.innerHTML = `
      ${itemsHTML}
      <div class="cart-total-row">
        <span class="cart-total-label">Разом</span>
        <span class="cart-total-price">${formatPrice(total)}</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Оформити замовлення →</button>
    `;
  }

  function checkout() {
    if (tg) {
      const items = Object.entries(cart).map(([id, qty]) => {
        const p = products.find(x => x.id == id);
        return `${p.name} x${qty}`;
      }).join(', ');

      const total = Object.entries(cart).reduce((sum, [id, qty]) => {
        const p = products.find(x => x.id == id);
        return sum + (p ? p.price * qty : 0);
      }, 0);

      tg.sendData(JSON.stringify({
        action: 'checkout',
        items: Object.entries(cart).map(([id, qty]) => ({ id: parseInt(id), qty })),
        total: total
      }));
    } else {
      showToast('🎉 Замовлення оформлено!');
    }
  }

  // TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // INIT
  initProducts();
</script>
</body>
</html>
